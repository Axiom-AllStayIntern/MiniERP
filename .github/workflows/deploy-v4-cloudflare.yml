name: Deploy v4 to Cloudflare

on:
  push:
    branches:
      - v4/GoLive
  workflow_dispatch:

jobs:
  deploy-v4:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: production-v4
      url: https://smartfin-v4.aki-wang.workers.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Cloudflare worker types
        run: npm run gen

      - name: CI checks (type + static analysis)
        run: npm run check

      - name: Build
        run: npm run build

      # 方案 A：沿用你现在的 secret put 方式
      # 注意：secret put 会立即部署 worker
      - name: Sync v4 Worker secrets
        run: |
          test -n "$BETTER_AUTH_SECRET"
          test -n "$RESEND_API_KEY"
          printf '%s' "$BETTER_AUTH_SECRET" | npx wrangler secret put BETTER_AUTH_SECRET --env v4
          printf '%s' "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY --env v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Run v4 migrations
        run: npx wrangler d1 migrations apply smartfin-db-v4 --remote --env v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy v4 document processor
        run: npx wrangler deploy --config workers/wrangler.document-processor.jsonc --env v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy v4 app worker
        run: npx wrangler deploy --env v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}