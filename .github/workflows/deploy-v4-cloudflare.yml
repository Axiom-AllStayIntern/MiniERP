name: Deploy MiniERP Personal v4 to Cloudflare

on:
  push:
    branches:
      - feature/aki-finance-dev

  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Run D1 migrations before deploy"
        required: true
        type: boolean
        default: true

concurrency:
  group: deploy-minierp-personal-v4
  cancel-in-progress: false

jobs:
  deploy-personal-v4:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    environment:
      name: personal-v4
      url: https://smartfin.aki-wang.workers.dev

    permissions:
      contents: read

    steps:
      # ── 1. Checkout / Setup ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Cloudflare worker types
        run: npm run gen
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── 2. Lint + Type Check ───────────────────────────────────────────────
      - name: Lint
        run: npm run lint

      - name: Svelte type check
        run: npx svelte-kit sync && npx svelte-check --tsconfig ./tsconfig.json

      # ── 3. Architecture Boundary ──────────────────────────────────────────
      - name: Architecture boundary check
        run: npm run check:modular-boundary

      # ── 4. Tests ──────────────────────────────────────────────────────────
      - name: Unit tests
        run: npm run test

      # ── 5. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── 6. Sync Secrets ───────────────────────────────────────────────────
      - name: Sync app worker secrets
        shell: bash
        run: |
          test -n "$BETTER_AUTH_SECRET"
          test -n "$RESEND_API_KEY"

          printf '%s' "$BETTER_AUTH_SECRET" | npx wrangler secret put BETTER_AUTH_SECRET
          printf '%s' "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY

          if [ -n "${OPENAI_API_KEY:-}" ]; then
            printf '%s' "$OPENAI_API_KEY" | npx wrangler secret put OPENAI_API_KEY
          fi

          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            printf '%s' "$ANTHROPIC_API_KEY" | npx wrangler secret put ANTHROPIC_API_KEY
          fi

          if [ -n "${GEMINI_API_KEY:-}" ]; then
            printf '%s' "$GEMINI_API_KEY" | npx wrangler secret put GEMINI_API_KEY
            printf '%s' "$GEMINI_API_KEY" | npx wrangler secret put GEMINI_API_KEY --config workers/wrangler.document-processor.jsonc
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # ── 7. D1 Migrations ──────────────────────────────────────────────────
      - name: Run personal v4 migrations
        if: ${{ github.event_name == 'push' || inputs.run_migrations == true }}
        run: npx wrangler d1 migrations apply smartfin-db-v4 --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── 8. Deploy Workers ─────────────────────────────────────────────────
      - name: Deploy document processor
        run: npx wrangler deploy --config workers/wrangler.document-processor.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy app worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}